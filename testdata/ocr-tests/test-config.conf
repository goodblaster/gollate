# OCR Test Configuration
# =====================
# Defines which test combinations run-ocr-tests.sh should skip and why.
# Format: test-name:engine:reason
#
# The authoritative accuracy gate is the Go suite (go test ./integration),
# which never skips: every generated test/engine pair has a ratcheting
# baseline in baselines.json, so even currently-weak combinations (e.g.
# vertical Japanese) are tracked rather than skipped.
#
# Lines starting with # are comments. Currently no combinations are skipped.
